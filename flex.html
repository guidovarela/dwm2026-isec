<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex</title>
    <style>
        .flex-container{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-around;
            width: 90%;
            margin: 0 auto;
        }
       
        .flex-item{
            width: 30%;
            background: tomato;
            height: 100px;
            border-radius: 5px;
            margin-bottom: 15px;
            /* border: solid; */
        }
    </style>
</head>
<body>
    
    <div>
        <h1>Flexbox</h1>
    </div>

    <div class="flex-container">
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
        <div class="flex-item"></div>
    </div>

</body>
</html>
